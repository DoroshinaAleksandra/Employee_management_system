name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linter
      run: |
        pylint main.py services.py schemas.py models.py database.py --exit-zero

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=term-missing

    - name: Check coverage
      run: |
        pytest tests/ --cov=. --cov-fail-under=50 --cov-report=term
