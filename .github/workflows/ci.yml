name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

  lint:
    name: Code Style Check
    runs-on: ubuntu-latest
    needs: [install]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run Pylint
      run: |
        pylint src/management_system/main.py \
               src/management_system/services.py \
               src/management_system/schemas.py \
               src/management_system/models.py \
               src/management_system/database.py --exit-zero

  type-check:
    name: Mypy Check
    runs-on: ubuntu-latest
    needs: [install]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run Mypy
      run: |
        mypy src/management_system/main.py \
             src/management_system/services.py \
             src/management_system/schemas.py \
             src/management_system/models.py \
             src/management_system/database.py --ignore-missing-imports

  unit-tests:
    name: Pytest Check
    runs-on: ubuntu-latest
    needs: [install]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run Pytest
      run: pytest tests/ -v --cov=src/management_system --cov-report=term-missing

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: [install]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Check Coverage
      run: pytest tests/ --cov=src/management_system --cov-fail-under=50 --cov-report=term
